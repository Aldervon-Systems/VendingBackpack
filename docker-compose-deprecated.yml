services:
  postgres:
    image: postgres:15-alpine
    container_name: vending_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vending
      POSTGRES_USER: vending_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vending_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vending_user -d vending" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend_Deprecated
      dockerfile: Dockerfile
    container_name: vending_backpack_deprecated
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgresql://vending_user:${DB_PASSWORD}@postgres:5432/vending
      DEMO_MODE: ${DEMO_MODE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vending_network

  frontend:
    image: nginx:stable-alpine
    container_name: vending_frontend
    restart: unless-stopped
    environment:
      API_SCHEME: ${API_SCHEME:-http}
      API_PRIMARY_HOST: ${API_PRIMARY_HOST:-backend:8080}
      API_FALLBACK_HOST: ${API_FALLBACK_HOST:-backend:8080}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - vending_network
    depends_on:
      - backend
    volumes:
      - ./Frontend_Deprecated/build/web:/usr/share/nginx/html:ro
      - ./Frontend_Deprecated/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro

volumes:
  postgres_data:
    driver: local

networks:
  vending_network:
    driver: bridge
