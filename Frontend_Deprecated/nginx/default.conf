server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve Flutter web app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the primary backend, fail over to demo on 5xx/timeout.
    location /api/ {
        proxy_intercept_errors on;
        proxy_pass ${API_SCHEME}://${API_PRIMARY_HOST};
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_page 502 503 504 = @api_fallback;
    }

    location @api_fallback {
        proxy_pass ${API_SCHEME}://${API_FALLBACK_HOST};
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy health check with fallback
    location /health {
        proxy_intercept_errors on;
        proxy_pass ${API_SCHEME}://${API_PRIMARY_HOST};
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_page 502 503 504 = @health_fallback;
    }

    location @health_fallback {
        proxy_pass ${API_SCHEME}://${API_FALLBACK_HOST};
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
