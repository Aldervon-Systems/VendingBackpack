<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VendingBackpack v2">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Vending Backpack v2.4</title>
  <link rel="manifest" href="manifest.json">

  <!-- FORCE DELETE SERVICE WORKER AND CACHE, THEN LOAD APP -->
  <script>
    async function loadApp() {
      console.log('Checking for stale cache/service workers...');

      // 1. Cleanup Service Workers
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (let registration of registrations) {
          await registration.unregister();
          console.log('ServiceWorker unregistered');
        }
      }

      // 2. Cleanup Cache Storage
      if ('caches' in window) {
        const keys = await caches.keys();
        for (const key of keys) {
          await caches.delete(key);
          console.log('Cache memory cleared:', key);
        }
      }

      // 3. Load the app with cache busting timestamp
      console.log('Starting app (v2.4)...');
      const script = document.createElement('script');
      script.src = "flutter_bootstrap.js?v=" + new Date().getTime();
      script.async = true;
      document.body.appendChild(script);
    }

    // Run on window load
    window.addEventListener('load', loadApp);
  </script>
</head>

<body>
  <!-- Script injected by loadApp() -->
</body>

</html>
