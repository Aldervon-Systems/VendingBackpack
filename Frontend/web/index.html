<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VendingBackpack v2">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Vending Backpack v2.4</title>
  <link rel="manifest" href="manifest.json">

  <!-- FORCE DELETE SERVICE WORKER AND CACHE, THEN LOAD APP -->
  <script>
    async function nukeServiceWorkers() {
      console.log('NUKING ALL SERVICE WORKERS AND CACHES...');

      // 1. Unregister ALL service workers across the whole domain
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const registration of registrations) {
          await registration.unregister();
          console.log('Unregistered SW:', registration.scope);
        }
      }

      // 2. Clear ALL cache storage
      if ('caches' in window) {
        const keys = await caches.keys();
        for (const key of keys) {
          await caches.delete(key);
          console.log('Deleted Cache:', key);
        }
      }

      // 3. Clear IndexedDB (Flutter often stores data here)
      if ('indexedDB' in window) {
        const databases = await window.indexedDB.databases();
        for (const db of databases) {
          if (db.name) {
            window.indexedDB.deleteDatabase(db.name);
            console.log('Deleted IndexedDB:', db.name);
          }
        }
      }

      // 4. Final clear wasm cache if applicable
      // Note: This is an extra precaution
    }

    async function loadApp() {
      await nukeServiceWorkers();

      console.log('Starting app [v3.0.0-PRO-CLEAN-BOOT]...');
      const script = document.createElement('script');
      // Pass unique URL to force fetch of the bootstrap
      script.src = "flutter_bootstrap.js?nocache=" + Date.now();
      script.async = true;
      document.body.appendChild(script);
    }

    window.addEventListener('load', loadApp);
  </script>
</head>

<body>
  <!-- Script injected by loadApp() -->
</body>

</html>
