server {
    listen 80;
    server_name localhost;

    # Internal Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. Disable caching for the entry points
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 2. Specifically prevent caching of the service worker AND the main JS bundle AND WASM/BIN
    location ~* (index\.html|flutter_service_worker\.js|flutter\.js|flutter_bootstrap\.js|main\.dart\.js|.*\.wasm|.*\.bin)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # 3. API Proxy
    location /api/ {
        set $backend_upstream "http://backend:9090";
        proxy_intercept_errors on;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Cache static images/fonts, but BE CAREFUL with JS/JSON
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Ensure JS and JSON are NEVER cached during this transition
    location ~* \.(js|json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }
}
